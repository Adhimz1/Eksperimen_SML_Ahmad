name: CI ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run MLflow Project
        run: |
          cd Workflow-CI/MLProject
          mlflow run . --env-manager=local

      - name: Upload Artifact Model
        uses: actions/upload-artifact@v4
        with:
          name: model-terlatih
          path: Workflow-CI/MLProject/model_artefak/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd Workflow-CI/MLProject
          mlflow models build-docker -m model_artefak -n ${{ secrets.DOCKER_USERNAME }}/mlops-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mlops-model:latest