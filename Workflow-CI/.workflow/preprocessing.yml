name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'dataset_raw/**'
      - 'automate_Ahmad.py'

jobs:
  preprocess:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Automation Script
        run: |
          python automate_Ahmad.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Update preprocessed dataset"
          file_pattern: 'Membangun_model/dataset_preprocessing/*.csv'